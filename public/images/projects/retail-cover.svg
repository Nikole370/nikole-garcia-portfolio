<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Stylized preview of the retail sales performance dashboard">
  <!-- Placeholder cover — replace with an approved dashboard screenshot (see CONTENT_REVIEW.md) -->
  <rect width="1200" height="675" fill="#f4f4f1"/>
  <text x="64" y="86" font-family="ui-monospace,Menlo,monospace" font-size="26" fill="#0e7c86" letter-spacing="4">RETAIL 2025</text>
  <text x="64" y="130" font-family="ui-sans-serif,system-ui,sans-serif" font-size="34" font-weight="700" fill="#1c2025">Sales target &amp; profitability</text>

  <!-- KPI cards -->
  <g font-family="ui-sans-serif,system-ui,sans-serif">
    <rect x="64" y="170" width="340" height="120" rx="12" fill="#ffffff" stroke="#dcdcd6"/>
    <text x="88" y="212" font-size="18" fill="#4d565f">Sales 2025</text>
    <text x="88" y="262" font-size="40" font-weight="700" fill="#0e7c86">S/ 163.0M</text>

    <rect x="428" y="170" width="340" height="120" rx="12" fill="#ffffff" stroke="#dcdcd6"/>
    <text x="452" y="212" font-size="18" fill="#4d565f">Target attainment</text>
    <text x="452" y="262" font-size="40" font-weight="700" fill="#b4540a">89.4%</text>

    <rect x="792" y="170" width="344" height="120" rx="12" fill="#ffffff" stroke="#dcdcd6"/>
    <text x="816" y="212" font-size="18" fill="#4d565f">Gross margin</text>
    <text x="816" y="262" font-size="40" font-weight="700" fill="#4d7c0f">41.4%</text>
  </g>

  <!-- Monthly bars vs target -->
  <g>
    <rect x="64" y="330" width="1072" height="280" rx="12" fill="#ffffff" stroke="#dcdcd6"/>
    <text x="88" y="372" font-family="ui-sans-serif,system-ui,sans-serif" font-size="18" fill="#4d565f">Monthly sales vs. commercial target</text>
    <g fill="#0e7c86">
      <rect x="100"  y="500" width="52" height="88"/>
      <rect x="184"  y="486" width="52" height="102"/>
      <rect x="268"  y="494" width="52" height="94"/>
      <rect x="352"  y="472" width="52" height="116"/>
      <rect x="436"  y="480" width="52" height="108"/>
      <rect x="520"  y="462" width="52" height="126"/>
      <rect x="604"  y="502" width="52" height="86"/>
      <rect x="688"  y="458" width="52" height="130"/>
      <rect x="772"  y="450" width="52" height="138"/>
      <rect x="856"  y="444" width="52" height="144"/>
      <rect x="940"  y="436" width="52" height="152"/>
      <rect x="1024" y="428" width="52" height="160"/>
    </g>
    <!-- target line -->
    <polyline points="100,470 1076,398" fill="none" stroke="#7c8790" stroke-width="4" stroke-dasharray="12 8"/>
