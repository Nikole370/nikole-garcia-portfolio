<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Stylized preview of the NYC 311 analytics dashboard">
  <!-- Placeholder cover — replace with an approved dashboard screenshot (see CONTENT_REVIEW.md) -->
  <rect width="1200" height="675" fill="#141a22"/>
  <text x="64" y="86" font-family="ui-monospace,Menlo,monospace" font-size="26" fill="#4cc4ce" letter-spacing="4">NYC 311 ANALYTICS</text>
  <text x="64" y="130" font-family="ui-sans-serif,system-ui,sans-serif" font-size="34" font-weight="700" fill="#e8eaed">~20.8M service requests · 2020–2026</text>

  <!-- KPI cards -->
  <g font-family="ui-sans-serif,system-ui,sans-serif">
    <rect x="64" y="170" width="248" height="110" rx="12" fill="#1c2530"/>
    <text x="88" y="212" font-size="18" fill="#8b98a5">Median resolution</text>
    <text x="88" y="256" font-size="36" font-weight="700" fill="#4cc4ce">7.1 h</text>

    <rect x="330" y="170" width="248" height="110" rx="12" fill="#1c2530"/>
    <text x="354" y="212" font-size="18" fill="#8b98a5">Resolved &lt; 1 day</text>
    <text x="354" y="256" font-size="36" font-weight="700" fill="#a3cc5e">4 KPIs</text>

    <rect x="596" y="170" width="248" height="110" rx="12" fill="#1c2530"/>
    <text x="620" y="212" font-size="18" fill="#8b98a5">Agencies profiled</text>
    <text x="620" y="256" font-size="36" font-weight="700" fill="#e8eaed">20 · PCA</text>

    <rect x="862" y="170" width="274" height="110" rx="12" fill="#1c2530"/>
    <text x="886" y="212" font-size="18" fill="#8b98a5">Analytical views</text>
    <text x="886" y="256" font-size="36" font-weight="700" fill="#e8eaed">6</text>
  </g>

  <!-- Borough bars -->
  <g>
    <rect x="64" y="320" width="520" height="290" rx="12" fill="#1c2530"/>
    <text x="88" y="360" font-family="ui-sans-serif,system-ui,sans-serif" font-size="18" fill="#8b98a5">Requests by borough</text>
    <rect x="88"  y="560" width="72" height="30"  fill="#2e6f75"/>
    <rect x="176" y="500" width="72" height="90"  fill="#38858c"/>
    <rect x="264" y="450" width="72" height="140" fill="#419aa2"/>
    <rect x="352" y="415" width="72" height="175" fill="#4cc4ce"/>
    <rect x="440" y="385" width="72" height="205" fill="#5fd4de"/>
  </g>

  <!-- Trend line -->
  <g>
    <rect x="616" y="320" width="520" height="290" rx="12" fill="#1c2530"/>
    <text x="640" y="360" font-family="ui-sans-serif,system-ui,sans-serif" font-size="18" fill="#8b98a5">Volume trend 2020–2026</text>
    <polyline points="640,560 720,540 800,548 880,505 960,488 1040,455 1112,420"
      fill="none" stroke="#a3cc5e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#a3cc5e">
      <circle cx="640" cy="560" r="7"/><circle cx="720" cy="540" r="7"/>
      <circle cx="800" cy="548" r="7"/><circle cx="880" cy="505" r="7"/>
      <circle cx="960" cy="488" r="7"/><circle cx="1040" cy="455" r="7"/>
      <circle cx="1112" cy="420" r="7"/>
    </g>
  </g>
</svg>
